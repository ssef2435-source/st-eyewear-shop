    <style>
        /* ===== التصميم العام ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { 
            max-width: 850px; 
            margin: auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        
        /* ===== شريط العنوان ===== */
        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* ===== المنتجات ===== */
        .product-list { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        .product { 
            background: white; 
            border: 1px solid #e0e0e0; 
            border-radius: 15px; 
            overflow: hidden; 
            transition: transform 0.3s, box-shadow 0.3s; 
        }
        .product:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .product-info {
            padding: 20px;
        }
        .product-info h3 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .product-info .desc {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .price { 
            color: #27ae60; 
            font-weight: bold; 
            font-size: 24px; 
            margin-bottom: 15px; 
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .btn-order { 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
        }
        .btn-order:hover { 
            background: linear-gradient(135deg, #2980b9, #21618c); 
            transform: scale(1.02);
        }
        .btn-order:active {
            transform: scale(0.98);
        }
        
        /* ===== نموذج الطلب ===== */
        #order-form { 
            display: none; 
            padding: 30px; 
            background: #f8f9fa; 
            border-top: 2px solid #e0e0e0; 
        }
        #order-form h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        #selected-product {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input, textarea { 
            display: block; 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn-submit { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; 
            margin-top: 10px;

        .btn-submit:hover {

        /* ===== الرسائل ===== */

<body>

    <div class="container">
        <!-- شريط العنوان -->
        <div class="header">
            <h1>🕶️ St-Eyewear-Shop</h1>
            <p>Lunettes de Soleil et de Vue Haut de Gamme • Livraison Partout au Maroc</p>
        </div>
        
        <!-- المنتجات -->
        <div id="product-list"><div class="loading">⏳ Chargement des produits...</div></div>
        <div id="error-message" class="message error"></div>

        <!-- نموذج الطلب -->
        <div id="order-form">
            <h2>📝 Finaliser la commande</h2>
            <div id="selected-product"></div>
            
            <form id="order-form-element" method="POST">
                <input type="text" name="name" placeholder="Nom complet *" required>
                <input type="tel" name="phone" placeholder="Numéro de téléphone *" required>
                <input type="text" name="city" placeholder="Ville *" required>
                <textarea name="address" placeholder="Adresse détaillée *" rows="3" required></textarea>
                <input type="hidden" name="product" id="product-input">
                <input type="hidden" name="email" value="Non fourni">
                <input type="hidden" name="qty" value="1">
                <input type="hidden" name="total" value="0">
                <button type="submit" class="btn btn-submit">📩 Confirmer la commande</button>
            </form>
            
            <button class="btn btn-back" onclick="goBack()">🔙 Retour aux produits</button>
            <div id="order-message" class="message"></div>
        </div>
        
        <!-- فوطار -->
        <div class="footer">
            <p>© 2026 <strong>St-Eyewear-Shop</strong> • Tous droits réservés</p>
            <p>📞 WhatsApp: <a href="https://wa.me/212600000000">+212 600-000000</a> | ✉️ st-eyewear-shop@gmail.com</p>
        </div>
    </div>

    <script>
        // ⚠️ API URL
        const API_URL = "https://script.google.com/macros/s/AKfycbxvFNd5357f9Pdhniukmi_GDzWVNR_1F700wV3Ed_d95088RLp5mKgydgK7vT0oVBl_/exec";
        
        let currentProduct = "";

        function loadProducts() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", API_URL + "?action=getProducts", true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var products = JSON.parse(xhr.responseText);
                    if (products.length === 0) {
                        document.getElementById("product-list").innerHTML = '<div class="loading">Aucun produit disponible pour le moment.</div>';
                        return;
                    }
                    var html = '<div class="product-list">';
                    products.forEach(function(product) {
                        html += '<div class="product">';
                        html += '<img src="' + (product[3] || 'https://i.imgur.com/4T2sB5y.jpg') + '" alt="' + product[0] + '" class="product-img">';
                        html += '<div class="product-info">';
                        html += '<h3>' + product[0] + '</h3>';
                        html += '<p class="desc">' + (product[2] || '') + '</p>';
                        html += '<p class="price">' + product[1] + ' DH</p>';
                        html += '<button class="btn btn-order" onclick="showOrderForm(\'' + product[0] + '\', \'' + product[1] + '\')">🛒 Commander</button>';
                        html += '</div></div>';
                    });
                    html += '</div>';
                    document.getElementById("product-list").innerHTML = html;
                } else {
                    document.getElementById("error-message").style.display = "block";
                    document.getElementById("error-message").innerText = "❌ Échec du chargement.";
                }
            };
            xhr.onerror = function() {
                document.getElementById("error-message").style.display = "block";
                document.getElementById("error-message").innerText = "❌ Erreur de connexion.";
            };
            xhr.send();
        }

        function showOrderForm(name, price) {
            document.getElementById("product-list").style.display = "none";
            document.getElementById("order-form").style.display = "block";
            document.getElementById("selected-product").innerHTML = "<strong>Produit :</strong> " + name + "<br><strong>Prix :</strong> " + price + " DH";
            document.getElementById("product-input").value = name;
            currentProduct = name;
        }

        function goBack() {
            document.getElementById("product-list").style.display = "block";
            document.getElementById("order-form").style.display = "none";
            document.getElementById("order-message").style.display = "none";
        }

        document.getElementById("order-form-element").addEventListener("submit", function(e) {
            e.preventDefault();
            var form = e.target;
            var formData = new FormData(form);
            var msgDiv = document.getElementById("order-message");
            
            var xhr = new XMLHttpRequest();
            xhr.open("POST", API_URL, true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    msgDiv.className = "message success";
                    msgDiv.innerHTML = "✅ Commande envoyée avec succès ! Nous vous contacterons bientôt.";
                    msgDiv.style.display = "block";
                    setTimeout(goBack, 3000);
                } else {
                    msgDiv.className = "message error";
                    msgDiv.innerHTML = "❌ Échec de l'envoi.";
                    msgDiv.style.display = "block";
                }
            };
            xhr.onerror = function() {
                msgDiv.className = "message error";
                msgDiv.innerHTML = "❌ Erreur de connexion.";
                msgDiv.style.display = "block";
            };
            xhr.send(formData);
        });

        window.onload = loadProducts;
    </script>
</body>
